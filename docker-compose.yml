version: '3.9'

services:
  # SQL Server Database
  hotelstay-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hotelstay-db
    environment:
      SA_PASSWORD: "HotelStay@2025"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - hotelstay-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P HotelStay@2025 -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # .NET Backend API
  hotelstay-api:
    build:
      context: .
      dockerfile: HotelStay.Api/Dockerfile
    container_name: hotelstay-api
    depends_on:
      hotelstay-db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "https://+:5001;http://+:5000"
      ConnectionStrings__DefaultConnection: "Server=hotelstay-db;Database=HotelStay;User Id=sa;Password=HotelStay@2025;Encrypt=False;"
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - ~/.aspnet/https:/root/.aspnet/https:ro
    networks:
      - hotelstay-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Angular Frontend
  hotelstay-ui:
    build:
      context: ./hotelstay-ui
      dockerfile: Dockerfile
    container_name: hotelstay-ui
    depends_on:
      - hotelstay-api
    environment:
      ANGULAR_API_BASE_URL: "http://hotelstay-api:5000"
    ports:
      - "4200:80"
    networks:
      - hotelstay-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  hotelstay-network:
    driver: bridge

volumes:
  sqlserver_data:
    driver: local
